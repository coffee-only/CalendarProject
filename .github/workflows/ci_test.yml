name: Java CI with Gradle

on:
  pull_request:
    branches: ["**"] 

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up jdk 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distributed:  'temurin'
          cache: 'gradle'

      - name: unit test
        run: cd api && chmod +x gradlew && ./gradlew test
   
